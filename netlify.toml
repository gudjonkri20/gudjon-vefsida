[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 5173
  publish = "dist"
  framework = "vite"
  autoLaunch = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"


# Explicitly set the build environment
[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Runtime env vars for /api/chat (Ask Guðjón AI):
#   ANTHROPIC_API_KEY  — Guðjón's PERSONAL Anthropic key. Set in
#                        Netlify UI → Site settings → Environment variables,
#                        or with: netlify env:set ANTHROPIC_API_KEY <key>
#                        When unset, the chat widget falls back to an
#                        "AI is offline" response and the rest of the site
#                        keeps working.